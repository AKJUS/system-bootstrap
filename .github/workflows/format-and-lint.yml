name: Format and lint

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: format-and-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-and-lint:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            jq \
            libxml2-utils \
            lua5.4 \
            ruby \
            shfmt \
            shellcheck \
            yamllint \
            zsh

      - name: Install formatter and linter tools
        uses: taiki-e/install-action@v2
        with:
          tool: just,taplo-cli,stylua,selene
          fallback: none

      - name: Install Node.js tools
        run: |
          npm install --global prettier markdownlint-cli2

      - name: Format repository
        run: just format

      - name: Commit formatting changes
        run: |
          if git diff --quiet; then
            echo "No formatting changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: autoformat"
          git push

      - name: Lint repository
        run: just lint
