name: Format and lint

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: format-and-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-and-lint:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            jq \
            libxml2-utils \
            lua5.4 \
            ruby \
            shfmt \
            shellcheck \
            unzip \
            yamllint \
            zsh

      - name: Install formatter and linter tools
        uses: taiki-e/install-action@v2
        with:
          tool: just,taplo-cli
          fallback: none

      - name: Install Lua formatter and linter binaries
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          install_release_binary() {
            repo="$1"
            asset_pattern="$2"
            binary="$3"
            workdir="$(mktemp -d)"
            release_json="${workdir}/release.json"

            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/${repo}/releases/latest" \
              -o "${release_json}"

            asset_url="$(jq -r --arg pattern "${asset_pattern}" \
              '.assets[] | select(.name | test($pattern)) | .browser_download_url' \
              "${release_json}" | head -n 1)"

            if [ -z "${asset_url}" ]; then
              echo "No matching release asset found for ${repo} with pattern ${asset_pattern}" >&2
              jq -r '.assets[].name' "${release_json}" >&2
              exit 1
            fi

            archive="${workdir}/${asset_url##*/}"
            curl -fsSL "${asset_url}" -o "${archive}"

            case "${archive}" in
              *.zip) unzip -q "${archive}" -d "${workdir}/extract" ;;
              *.tar.gz | *.tgz) mkdir -p "${workdir}/extract" && tar -xzf "${archive}" -C "${workdir}/extract" ;;
              *) echo "Unsupported archive type: ${archive}" >&2; exit 1 ;;
            esac

            binary_path="$(find "${workdir}/extract" -type f -name "${binary}" | head -n 1)"
            if [ -z "${binary_path}" ]; then
              echo "Archive did not contain ${binary}" >&2
              find "${workdir}/extract" -type f >&2
              exit 1
            fi

            chmod +x "${binary_path}"
            sudo mv "${binary_path}" "/usr/local/bin/${binary}"
            rm -rf "${workdir}"
          }

          install_release_binary \
            "JohnnyMorganz/StyLua" \
            'linux.*x86_64.*\.(zip|tar\.gz|tgz)$|x86_64.*linux.*\.(zip|tar\.gz|tgz)$' \
            "stylua"

          install_release_binary \
            "Kampfkarren/selene" \
            'linux.*x86_64.*\.(zip|tar\.gz|tgz)$|x86_64.*linux.*\.(zip|tar\.gz|tgz)$' \
            "selene"

          stylua --version
          selene --version

      - name: Install Node.js tools
        run: |
          npm install --global prettier markdownlint-cli2

      - name: Format repository
        run: just format

      - name: Commit formatting changes
        run: |
          if git diff --quiet; then
            echo "No formatting changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: autoformat"
          git push

      - name: Lint repository
        run: just lint
